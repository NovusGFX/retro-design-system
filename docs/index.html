<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDS Explorer</title>
    <style>
      :root {
        --bg: #101722;
        --panel: #182233;
        --panel-2: #21304a;
        --text: #edf2ff;
        --muted: #9eb0d1;
        --accent: #6ee7c8;
        --accent-2: #7aa8ff;
        --border: #2f4261;
        --danger: #ff7b88;
        --body-grad-1: #1f3558;
        --body-grad-2: #1c5f63;
        --body-grad-3: #0d1420;
        --body-grad-4: #0e1d2f;
        --body-grad-5: #11192a;
        --sidebar-grad-1: #152034;
        --sidebar-grad-2: #101a2a;
        --topbar-bg: rgba(18, 30, 47, 0.78);
        --meta-bg: rgba(14, 24, 39, 0.85);
        --btn-bg: #1d2940;
        --btn-primary-1: #1d6457;
        --btn-primary-2: #174a41;
        --preview-bg: #0f1725;
        --radius-btn: 10px;
        --radius-panel: 12px;
        --radius-preview: 14px;
        --radius-pill: 999px;
        --btn-padding: 8px 12px;
        --sys-padding: 9px 10px;
        --btn-shadow: none;
        --sys-shadow: none;
        --btn-hover-transform: translateY(-1px);
        --sys-hover-transform: translateX(2px);
        --btn-text-transform: none;
        --btn-letter-spacing: normal;
        --btn-font-weight: 600;
        --btn-border-style: solid;
        --panel-border-style: solid;
        --btn-border-width: 1px;
        --sys-border-width: 1px;
        --btn-text-shadow: none;
        --sys-text-shadow: none;
        --btn-primary-bg: linear-gradient(180deg, var(--btn-primary-1), var(--btn-primary-2));
        --btn-primary-color: var(--text);
        --btn-primary-shadow: var(--btn-shadow);
        --btn-primary-hover-transform: var(--btn-hover-transform);
        --btn-hover-bg: var(--panel-2);
        --sys-hover-bg: var(--panel-2);
        --chrome-anim: none;
        --chrome-anim-duration: 0ms;
        --chrome-anim-timing: linear;
        --chrome-anim-iter: 1;
        --hover-duration: 120ms;
        --hover-easing: ease;
        --overlay-opacity: 0;
        --overlay-blend: normal;
        --ui-font: "Trebuchet MS", "Segoe UI", sans-serif;
        --ui-heading-font: "Trebuchet MS", "Segoe UI", sans-serif;
        --ui-control-font: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: var(--ui-font);
        background:
          radial-gradient(circle at 15% 15%, var(--body-grad-1) 0%, transparent 30%),
          radial-gradient(circle at 85% 20%, var(--body-grad-2) 0%, transparent 32%),
          linear-gradient(170deg, var(--body-grad-3) 0%, var(--body-grad-4) 45%, var(--body-grad-5) 100%);
      }

      .app {
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, var(--sidebar-grad-1) 0%, var(--sidebar-grad-2) 100%);
        padding: 18px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
      }

      .title {
        margin: 0;
        letter-spacing: 0.04em;
        font-size: 1.2rem;
        font-family: var(--ui-heading-font);
      }

      .subtitle {
        margin: 8px 0 18px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      code {
        font-family: inherit;
      }

      .list {
        display: grid;
        gap: 8px;
        overflow-y: auto;
        padding-right: 4px;
        flex: 1;
        min-height: 0;
        align-content: start;
      }

      .sys-btn {
        border: var(--sys-border-width) var(--btn-border-style) var(--border);
        background: var(--panel);
        color: var(--text);
        text-align: left;
        border-radius: var(--radius-btn);
        padding: var(--sys-padding);
        cursor: pointer;
        box-shadow: var(--sys-shadow);
        text-shadow: var(--sys-text-shadow);
        font-family: var(--ui-control-font);
        transition: transform var(--hover-duration) var(--hover-easing), border-color var(--hover-duration) var(--hover-easing), background var(--hover-duration) var(--hover-easing);
        position: relative;
      }

      .sys-btn:hover {
        transform: var(--sys-hover-transform);
        border-color: var(--accent-2);
        background: var(--sys-hover-bg);
      }

      .sys-btn.active {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--panel-2), var(--accent) 14%);
        box-shadow:
          inset 0 0 0 1px color-mix(in srgb, var(--accent), transparent 40%),
          0 0 0 1px color-mix(in srgb, var(--accent), transparent 72%);
        transform: translateX(4px);
      }

      .sys-btn.active::before {
        content: "";
        position: absolute;
        top: 6px;
        bottom: 6px;
        left: -2px;
        width: 3px;
        border-radius: 999px;
        background: var(--accent);
      }

      .sys-name {
        font-weight: 700;
        display: block;
        font-family: var(--ui-heading-font);
      }

      .sys-era {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .sys-meta {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .new-chip {
        display: inline-block;
        border: 1px solid color-mix(in srgb, var(--accent), #000 25%);
        border-radius: 999px;
        padding: 1px 6px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--accent);
      }

      .main {
        padding: 18px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: var(--topbar-bg);
        border: 1px var(--panel-border-style) var(--border);
        border-radius: var(--radius-panel);
        padding: 12px;
        backdrop-filter: blur(5px);
      }

      .topbar h2 {
        margin: 0;
        font-size: 1.1rem;
        font-family: var(--ui-heading-font);
      }

      .pill {
        display: inline-block;
        padding: 3px 8px;
        border-radius: var(--radius-pill);
        border: 1px var(--panel-border-style) var(--border);
        color: var(--muted);
        font-size: 0.8rem;
        font-family: var(--ui-control-font);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .btn {
        border: var(--btn-border-width) var(--btn-border-style) var(--border);
        border-radius: var(--radius-btn);
        padding: var(--btn-padding);
        color: var(--text);
        background: var(--btn-bg);
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: var(--btn-font-weight);
        text-transform: var(--btn-text-transform);
        letter-spacing: var(--btn-letter-spacing);
        box-shadow: var(--btn-shadow);
        text-shadow: var(--btn-text-shadow);
        font-family: var(--ui-control-font);
        transition: transform var(--hover-duration) var(--hover-easing), background var(--hover-duration) var(--hover-easing), border-color var(--hover-duration) var(--hover-easing);
      }

      .btn:hover {
        transform: var(--btn-hover-transform);
        background: var(--btn-hover-bg);
      }

      .btn.primary {
        border-color: color-mix(in srgb, var(--accent), #0f0f0f 35%);
        background: var(--btn-primary-bg);
        color: var(--btn-primary-color);
        box-shadow: var(--btn-primary-shadow);
      }

      .btn.primary:hover {
        transform: var(--btn-primary-hover-transform);
      }

      .meta {
        background: var(--meta-bg);
        border: 1px var(--panel-border-style) var(--border);
        border-radius: var(--radius-panel);
        padding: 10px 12px;
        color: var(--muted);
        font-size: 0.9rem;
        font-family: var(--ui-font);
      }

      .topbar,
      .meta,
      .preview-shell {
        animation: var(--chrome-anim) var(--chrome-anim-duration) var(--chrome-anim-timing) var(--chrome-anim-iter);
        transform-origin: center;
      }

      .preview-shell {
        min-height: 62vh;
        border: 1px var(--panel-border-style) var(--border);
        border-radius: var(--radius-preview);
        overflow: hidden;
        background: var(--preview-bg);
        position: relative;
      }

      .preview-shell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: var(--overlay-opacity);
        mix-blend-mode: var(--overlay-blend);
        background: repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 3px);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--preview-bg);
      }

      .empty {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--muted);
        padding: 16px;
        background: linear-gradient(180deg, rgba(19, 30, 46, 0.95), rgba(14, 20, 31, 0.95));
      }

      .empty.show {
        display: flex;
      }

      .hint {
        color: var(--danger);
        font-size: 0.83rem;
      }

      @keyframes rds-flicker {
        0%,
        100% { opacity: 1; filter: brightness(1); }
        49% { opacity: 0.98; filter: brightness(1.03); }
        50% { opacity: 0.95; filter: brightness(0.95); }
        51% { opacity: 0.99; filter: brightness(1.02); }
      }

      @keyframes rds-pulse {
        0%,
        100% { opacity: 1; }
        50% { opacity: 0.94; }
      }

      @keyframes rds-drift {
        0%,
        100% { transform: translateY(0px); }
        50% { transform: translateY(-1px); }
      }

      @keyframes rds-step {
        0% { opacity: 1; }
        25% { opacity: 0.93; }
        50% { opacity: 1; }
        75% { opacity: 0.9; }
        100% { opacity: 1; }
      }

      @media (max-width: 960px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--border);
          max-height: 38vh;
          overflow: hidden;
        }

        .main {
          grid-template-rows: auto auto minmax(58vh, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1 class="title">RDS Explorer</h1>
        <p class="subtitle">
          Select a system to preview it individually from this repository.
          <span id="system-count-note">Each preview loads from the organized styles folder.</span>
        </p>
        <div id="system-list" class="list" aria-label="Design systems"></div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <h2 id="selected-name">Loading...</h2>
            <span id="selected-era" class="pill">Era</span>
          </div>
          <div class="actions">
            <a id="open-tab" class="btn primary" href="#" target="_blank" rel="noopener noreferrer">Open selected style demo</a>
          </div>
        </section>

        <section id="selected-vibe" class="meta"></section>

        <section class="preview-shell">
          <iframe id="preview-frame" title="Design system preview"></iframe>
          <div id="empty-state" class="empty">
            <div>
              <p>Preview blocked or file not found.</p>
              <p class="hint">Use the "Open full page" button if your browser blocks local iframe content.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>

      const listEl = document.getElementById("system-list");
      const frameEl = document.getElementById("preview-frame");
      const emptyEl = document.getElementById("empty-state");
      const nameEl = document.getElementById("selected-name");
      const eraEl = document.getElementById("selected-era");
      const vibeEl = document.getElementById("selected-vibe");
      const openTabEl = document.getElementById("open-tab");
      const countNoteEl = document.getElementById("system-count-note");

      countNoteEl.textContent = `Showing ${systems.length} systems from the organized styles folder.`;

      function createTheme(config) {
        return {
          font: config.font,
          headingFont: config.headingFont || config.font,
          controlFont: config.controlFont || config.font,
          vars: {
            "--bg": config.bg,
            "--panel": config.panel,
            "--panel-2": config.panel2,
            "--text": config.text,
            "--muted": config.muted,
            "--accent": config.accent,
            "--accent-2": config.accent2,
            "--border": config.border,
            "--body-grad-1": config.g1,
            "--body-grad-2": config.g2,
            "--body-grad-3": config.g3,
            "--body-grad-4": config.g4,
            "--body-grad-5": config.g5,

            "--meta-bg": config.meta,
            "--btn-bg": config.btn,
            "--btn-primary-1": config.btn1,
            "--btn-primary-2": config.btn2,
            "--preview-bg": config.preview
          }
        };
      }

      const themeMap = {

        document.documentElement.style.setProperty("--ui-font", selectedTheme.font);
        document.documentElement.style.setProperty("--ui-heading-font", selectedTheme.headingFont);
        document.documentElement.style.setProperty("--ui-control-font", selectedTheme.controlFont);
        Object.entries(selectedTheme.vars).forEach(([name, value]) => {
          document.documentElement.style.setProperty(name, value);
        });
      }

      function selectSystem(system, button) {
        if (activeButton) activeButton.classList.remove("active");
        activeButton = button;
        activeButton.classList.add("active");

        nameEl.textContent = `${system.id}. ${system.name}`;
        eraEl.textContent = system.era;
        vibeEl.textContent = `Vibe: ${system.vibe}`;

        openTabEl.href = system.path;
        emptyEl.classList.remove("show");
        frameEl.src = encodeURI(system.path);
        applyThemeForSystem(system.id);
        applyUiProfileForSystem(system.id);
        applyMotionProfileForSystem(system.id);

        const failTimer = window.setTimeout(() => {
          emptyEl.classList.add("show");
        }, 1400);

        frameEl.onload = () => {
          window.clearTimeout(failTimer);
          emptyEl.classList.remove("show");
        };
      }

      systems.forEach((system) => {
        const btn = document.createElement("button");
        btn.className = "sys-btn";
        btn.type = "button";
        const newChip = system.isNew ? '<span class="new-chip">NEW</span>' : "";
        btn.innerHTML = `<span class="sys-name">${system.id}. ${system.name}</span><span class="sys-meta"><span class="sys-era">${system.era}</span>${newChip}</span>`;
        btn.addEventListener("click", () => selectSystem(system, btn));
        listEl.appendChild(btn);
      });

      selectSystem(systems[0], listEl.firstElementChild);
    </script>
  </body>
</html>
