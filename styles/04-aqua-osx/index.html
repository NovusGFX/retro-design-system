<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>04 Mac OS X Aqua</title>
<style>
  :root {
    --bg: #b8c9e0;
    --chrome: linear-gradient(to bottom, #e8e8e8, #c8c8c8);
    --pinstripe: repeating-linear-gradient(to bottom, rgba(255,255,255,0.7) 0 1px, rgba(220,220,230,0.7) 1px 2px);
    --aqua-blue: #4d90fe;
    --aqua-blue-deep: #2057c2;
    --jelly-red: radial-gradient(circle at 30% 30%, #ff9a8a, #ff4b2b 40%, #b21808);
    --jelly-yellow: radial-gradient(circle at 30% 30%, #ffee8a, #ffbe2b 40%, #b28008);
    --jelly-green: radial-gradient(circle at 30% 30%, #b5f28a, #59c42b 40%, #1f7008);
    --ink: #1a1a1a;
    --font: "Lucida Grande", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #4a7db8 0%, #83b0e0 50%, #c8deff 100%);
    color: var(--ink);
    font-family: var(--font);
    font-size: 13px;
    padding: 30px;
    min-height: 100vh;
  }
  .menubar {
    background: linear-gradient(to bottom, #ffffff 0%, #e2e2e2 50%, #c8c8c8 100%);
    border-bottom: 1px solid #999;
    padding: 4px 14px;
    display: flex;
    gap: 16px;
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    border-radius: 0 0 4px 4px;
    margin-bottom: 24px;
  }
  .window {
    background: #f5f5f5;
    background-image: var(--pinstripe);
    border: 1px solid #555;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    max-width: 760px;
    margin-bottom: 32px;
  }
  .titlebar {
    background: linear-gradient(to bottom, #e6e6e6 0%, #bdbdbd 50%, #a0a0a0 100%);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #666;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .title { flex: 1; text-align: center; font-weight: 500; font-size: 13px; color: #333; }
  .traffic { display: flex; gap: 8px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 1px 1px rgba(0,0,0,0.3); }
  .dot.red { background: var(--jelly-red); }
  .dot.yellow { background: var(--jelly-yellow); }
  .dot.green { background: var(--jelly-green); }
  .content { padding: 20px; background-image: var(--pinstripe); }
  h1 { font-size: 24px; font-weight: 300; margin-bottom: 8px; color: #222; }
  h2 { font-size: 14px; font-weight: 500; margin: 16px 0 8px; color: #333; }
  p { line-height: 1.5; margin-bottom: 8px; color: #333; }
  .btn {
    font-family: var(--font);
    font-size: 13px;
    background: linear-gradient(to bottom, #ffffff, #dcdcdc);
    border: 1px solid #999;
    border-radius: 5px;
    padding: 4px 14px;
    cursor: pointer;
    box-shadow: inset 0 1px 0 #fff, 0 1px 1px rgba(0,0,0,0.1);
  }
  .btn-primary {
    background: linear-gradient(to bottom, #b1d1ff, #4d90fe 50%, #2057c2 100%);
    color: #fff;
    border-color: #1c4ca6;
    font-weight: 500;
    text-shadow: 0 -1px 0 rgba(0,0,0,0.3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 0 0 rgba(77,144,254,0); } 50% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 0 12px rgba(77,144,254,0.6); } }
  .input {
    background: #fff;
    border: 1px solid #888;
    border-radius: 10px;
    padding: 5px 12px;
    font-family: var(--font);
    font-size: 13px;
    box-shadow: inset 0 2px 2px rgba(0,0,0,0.1);
  }
  .input:focus { outline: none; border-color: var(--aqua-blue); box-shadow: 0 0 4px var(--aqua-blue); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
  .swatch { width: 60px; height: 60px; border-radius: 50%; box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), 0 2px 4px rgba(0,0,0,0.3); display: inline-block; }
  .toggle {
    background: linear-gradient(to bottom, #c8c8c8, #e8e8e8);
    border-radius: 20px;
    width: 50px; height: 24px;
    position: relative;
    display: inline-block;
    border: 1px solid #888;
  }
  .toggle::after { content: ""; position: absolute; top: 1px; left: 1px; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #ccc); box-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: left 0.2s; }
  .toggle.on { background: linear-gradient(to bottom, #4d90fe, #2057c2); }
  .toggle.on::after { left: 28px; }
  .dock {
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    padding: 6px 14px;
    display: inline-flex;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .dock-icon { width: 48px; height: 48px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .progress {
    background: #ddd;
    border-radius: 10px;
    height: 16px;
    overflow: hidden;
    border: 1px solid #888;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  }
  .progress-bar {
    width: 65%; height: 100%;
    background: linear-gradient(to bottom, #b1d1ff, #4d90fe 50%, #2057c2 100%);
    background-size: 20px 100%;
    background-image: linear-gradient(to bottom, #b1d1ff, #4d90fe 50%, #2057c2), repeating-linear-gradient(-45deg, rgba(255,255,255,0.3) 0 6px, transparent 6px 12px);
    animation: stripes 1s linear infinite;
  }
  @keyframes stripes { from { background-position: 0 0; } to { background-position: 20px 0; } }
</style>
</head>
<body>
<div class="menubar">
  <span>🍎</span><strong>Finder</strong><span>File</span><span>Edit</span><span>View</span><span>Go</span><span>Window</span><span>Help</span>
</div>

<div class="window">
  <div class="titlebar">
    <div class="traffic"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <div class="title">System Preferences</div>
    <div style="width:50px"></div>
  </div>
  <div class="content">
    <h1>Aqua</h1>
    <p>Glossy jellybean controls. Pinstripes. Lickable buttons. Soft shadows on translucent chrome.</p>

    <h2>Traffic Lights</h2>
    <div class="row"><span class="swatch" style="background:var(--jelly-red)"></span><span class="swatch" style="background:var(--jelly-yellow)"></span><span class="swatch" style="background:var(--jelly-green)"></span><span class="swatch" style="background:radial-gradient(circle at 30% 30%, #b1d1ff, #4d90fe 40%, #1c4ca6)"></span></div>

    <h2>Input</h2>
    <div class="row"><input class="input" value="Spotlight…" size="30"></div>

    <h2>Buttons</h2>
    <div class="row">
      <button class="btn btn-primary">OK</button>
      <button class="btn">Cancel</button>
      <span class="toggle on"></span>
      <span class="toggle"></span>
    </div>

    <h2>Progress</h2>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>
</div>

<div class="dock">
  <div class="dock-icon" style="background:var(--jelly-blue, linear-gradient(135deg,#4d90fe,#1c4ca6))"></div>
  <div class="dock-icon" style="background:var(--jelly-red)"></div>
  <div class="dock-icon" style="background:var(--jelly-green)"></div>
  <div class="dock-icon" style="background:var(--jelly-yellow)"></div>
  <div class="dock-icon" style="background:radial-gradient(circle at 30% 30%, #ddd, #666)"></div>
</div>
</body>
</html>
