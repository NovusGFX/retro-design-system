<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>01 Mac System 7</title>
<style>
  :root {
    --bg: #a8a8a8;
    --desktop: #888;
    --paper: #ffffff;
    --ink: #000000;
    --chrome: #dddddd;
    --shadow: #000;
    --font-sys: "Chicago", "Charcoal", "Geneva", Tahoma, sans-serif;
    --font-body: "Geneva", "Helvetica", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--desktop);
    background-image:
      repeating-conic-gradient(var(--bg) 0 25%, #9a9a9a 0 50%);
    background-size: 4px 4px;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 12px;
    padding: 30px;
    min-height: 100vh;
    image-rendering: pixelated;
  }
  .window {
    background: var(--paper);
    border: 1px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    margin-bottom: 24px;
  }
  .titlebar {
    background: repeating-linear-gradient(
      to bottom,
      var(--ink) 0 1px, var(--paper) 1px 2px
    );
    border-bottom: 1px solid var(--ink);
    padding: 3px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-sys);
    font-size: 12px;
  }
  .titlebar .title {
    background: var(--paper);
    padding: 0 10px;
    margin: 0 auto;
  }
  .closebox { width: 11px; height: 11px; background: var(--paper); border: 1px solid var(--ink); display: inline-block; }
  .zoombox { width: 11px; height: 11px; background: var(--paper); border: 1px solid var(--ink); position: relative; }
  .zoombox::after { content: ""; position: absolute; top: 1px; left: 1px; right: 4px; bottom: 4px; border: 1px solid var(--ink); }
  .content { padding: 14px; }
  h1 { font-family: var(--font-sys); font-size: 24px; font-weight: normal; margin-bottom: 8px; }
  h2 { font-family: var(--font-sys); font-size: 14px; margin: 16px 0 8px; }
  p { line-height: 1.4; margin-bottom: 8px; }
  .btn {
    font-family: var(--font-sys);
    font-size: 12px;
    background: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 8px;
    padding: 3px 14px;
    box-shadow: 1px 1px 0 var(--ink);
    cursor: pointer;
  }
  .btn:active { background: var(--ink); color: var(--paper); }
  .btn-default { border: 3px double var(--ink); font-weight: bold; }
  .input {
    font-family: var(--font-body);
    font-size: 12px;
    border: 1px solid var(--ink);
    padding: 2px 4px;
    background: var(--paper);
    box-shadow: inset 1px 1px 0 #888;
  }
  .check { font-family: var(--font-sys); display: inline-flex; align-items: center; gap: 6px; }
  .check span { width: 11px; height: 11px; border: 1px solid var(--ink); display: inline-block; background: var(--paper); }
  .check input { display: none; }
  .check input:checked + span::after { content: "✓"; font-size: 10px; line-height: 9px; display: block; text-align: center; }
  .menubar {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 2px 8px;
    display: flex;
    gap: 16px;
    font-family: var(--font-sys);
    margin-bottom: 16px;
  }
  .menubar .apple { font-size: 14px; }
  .swatch { width: 60px; height: 60px; border: 1px solid var(--ink); display: inline-block; margin-right: 4px; }
  .pattern-1 { background-image: repeating-conic-gradient(#000 0 25%, #fff 0 50%); background-size: 2px 2px; }
  .pattern-2 { background-image: repeating-linear-gradient(45deg, #000 0 1px, #fff 1px 3px); }
  .pattern-3 { background-image: repeating-linear-gradient(to right, #000 0 1px, #fff 1px 2px); }
  .pattern-4 { background: #fff; }
  .pattern-5 { background: #000; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
  .icon { width: 32px; height: 32px; border: 1px solid var(--ink); background: var(--paper); display: inline-block; position: relative; }
  .icon::after { content: ""; position: absolute; inset: 6px; border: 1px solid var(--ink); }
  .scroll { width: 12px; background: repeating-linear-gradient(to bottom, #fff 0 2px, #ccc 2px 4px); border: 1px solid var(--ink); display: inline-block; height: 120px; vertical-align: top; }
</style>
</head>
<body>
<div class="menubar">
  <span class="apple">🍎</span>
  <span>File</span><span>Edit</span><span>View</span><span>Label</span><span>Special</span>
</div>

<div class="window">
  <div class="titlebar"><span class="closebox"></span><span class="title">Macintosh System 7</span><span class="zoombox"></span></div>
  <div class="content">
    <h1>Welcome to Macintosh</h1>
    <p>A clean, honest, one-bit interface. Chicago for chrome, Geneva for body. Dithered grays do the rest.</p>
  </div>
</div>

<div class="window">
  <div class="titlebar"><span class="closebox"></span><span class="title">Desktop Patterns</span></div>
  <div class="content">
    <div class="row">
      <span class="swatch pattern-1"></span>
      <span class="swatch pattern-2"></span>
      <span class="swatch pattern-3"></span>
      <span class="swatch pattern-4"></span>
      <span class="swatch pattern-5"></span>
    </div>
  </div>
</div>

<div class="window">
  <div class="titlebar"><span class="closebox"></span><span class="title">Controls</span></div>
  <div class="content">
    <h2>Buttons</h2>
    <div class="row">
      <button class="btn btn-default">OK</button>
      <button class="btn">Cancel</button>
      <button class="btn">Save As…</button>
    </div>
    <h2>Input</h2>
    <div class="row">
      <input class="input" value="Untitled folder" size="24">
    </div>
    <h2>Checkboxes</h2>
    <div class="row">
      <label class="check"><input type="checkbox" checked><span></span>Show invisible files</label>
      <label class="check"><input type="checkbox"><span></span>Calculate folder sizes</label>
    </div>
    <h2>Icons</h2>
    <div class="row">
      <span class="icon"></span><span class="icon"></span><span class="icon"></span>
      <span class="scroll"></span>
    </div>
  </div>
</div>
</body>
</html>
