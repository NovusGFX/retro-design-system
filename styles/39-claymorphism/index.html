<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>39 Claymorphism</title>
<style>
  :root {
    --bg: #f0e9ff;
    --ink: #3a2e5c;
    --muted: #7c6ba8;
    --pink: #ffb3d1;
    --purple: #c9a8ff;
    --blue: #9ec8ff;
    --mint: #a8f0d0;
    --yellow: #ffe58a;
    --orange: #ffb38a;
    --font: "Nunito", "SF Pro Rounded", "Helvetica Neue", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-weight: 700;
    font-size: 15px;
    padding: 40px;
    min-height: 100vh;
    line-height: 1.5;
  }
  .page { max-width: 820px; margin: 0 auto; }
  .card {
    background: #fff;
    border-radius: 32px;
    padding: 32px;
    margin-bottom: 24px;
    box-shadow:
      inset 0 -10px 0 rgba(201,168,255,0.35),
      inset 0 6px 0 rgba(255,255,255,0.9),
      0 20px 40px rgba(58,46,92,0.15);
  }
  h1 { font-weight: 900; font-size: 48px; letter-spacing: -1px; margin-bottom: 6px; }
  h1 span { display: inline-block; padding: 0 14px; border-radius: 20px; background: var(--yellow); box-shadow: inset 0 -6px 0 rgba(0,0,0,0.08); }
  .sub { color: var(--muted); margin-bottom: 20px; font-weight: 700; }
  h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; }
  p { line-height: 1.6; margin-bottom: 8px; }
  .blob { width: 80px; height: 80px; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: 36px; color: #fff; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.12), inset 0 4px 0 rgba(255,255,255,0.4), 0 10px 20px rgba(58,46,92,0.15); }
  .b1 { background: var(--pink); }
  .b2 { background: var(--purple); }
  .b3 { background: var(--blue); }
  .b4 { background: var(--mint); }
  .b5 { background: var(--yellow); color: var(--ink); }
  .b6 { background: var(--orange); }
  .btn {
    font-family: var(--font);
    font-weight: 900;
    font-size: 15px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 14px 26px;
    cursor: pointer;
    box-shadow:
      inset 0 -6px 0 rgba(0,0,0,0.15),
      inset 0 4px 0 rgba(255,255,255,0.35),
      0 8px 16px rgba(58,46,92,0.2);
  }
  .btn:active { transform: translateY(2px); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.35), 0 4px 10px rgba(58,46,92,0.15); }
  .btn-pink { background: var(--pink); color: var(--ink); }
  .btn-mint { background: var(--mint); color: var(--ink); }
  .btn-yellow { background: var(--yellow); color: var(--ink); }
  .input {
    font-family: var(--font);
    font-weight: 700;
    font-size: 15px;
    background: var(--bg);
    color: var(--ink);
    border: none;
    border-radius: 20px;
    padding: 16px 20px;
    width: 340px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06), inset 0 4px 0 rgba(255,255,255,0.7), inset 0 0 0 2px rgba(201,168,255,0.2);
  }
  .input:focus { outline: none; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06), inset 0 4px 0 rgba(255,255,255,0.7), inset 0 0 0 3px var(--purple); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>soft &amp; <span>puffy</span></h1>
    <div class="sub">Every surface a cushion. Big radius. Inner highlight. Inner floor shadow. Outer drop. Pastel everywhere.</div>
    <p>Claymorphism. Like neumorphism but maximalist: bright, chunky, kid-shaped.</p>
  </div>

  <div class="card">
    <h2>Icons</h2>
    <div class="row">
      <div class="blob b1">♥</div>
      <div class="blob b2">★</div>
      <div class="blob b3">✿</div>
      <div class="blob b4">✓</div>
      <div class="blob b5">☀</div>
      <div class="blob b6">⚡</div>
    </div>

    <h2>Input</h2>
    <div class="row"><input class="input" value="hello@clay.design"></div>

    <h2>Buttons</h2>
    <div class="row">
      <button class="btn">Continue</button>
      <button class="btn btn-pink">Maybe</button>
      <button class="btn btn-mint">Nice</button>
      <button class="btn btn-yellow">Wow</button>
    </div>
  </div>
</div>
</body>
</html>
