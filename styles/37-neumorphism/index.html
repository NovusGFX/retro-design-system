<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>37 Neumorphism</title>
<style>
  :root {
    --bg: #e0e5ec;
    --ink: #4a5568;
    --muted: #8a94a6;
    --accent: #6c8cff;
    --shadow-dark: #a3b1c6;
    --shadow-light: #ffffff;
    --font: "Inter", "SF Pro", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 15px;
    padding: 40px;
    min-height: 100vh;
    line-height: 1.5;
  }
  .page { max-width: 820px; margin: 0 auto; }
  .card { background: var(--bg); border-radius: 24px; padding: 28px; margin-bottom: 24px; box-shadow: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light); }
  h1 { font-weight: 700; font-size: 42px; letter-spacing: -1px; margin-bottom: 6px; }
  .sub { color: var(--muted); margin-bottom: 20px; }
  h2 { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; }
  p { line-height: 1.6; margin-bottom: 8px; }
  .btn { font-family: var(--font); font-weight: 600; font-size: 14px; background: var(--bg); color: var(--ink); border: none; border-radius: 14px; padding: 12px 26px; cursor: pointer; box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
  .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
  .btn-primary { color: var(--accent); font-weight: 700; }
  .input { font-family: var(--font); font-size: 15px; background: var(--bg); color: var(--ink); border: none; border-radius: 14px; padding: 14px 18px; width: 340px; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
  .input:focus { outline: none; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
  .swatch { width: 70px; height: 70px; border-radius: 18px; background: var(--bg); box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); display: inline-block; }
  .toggle { width: 60px; height: 30px; background: var(--bg); border-radius: 30px; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); position: relative; cursor: pointer; }
  .toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: var(--bg); border-radius: 50%; box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light); }
  .toggle.on::after { left: 33px; background: var(--accent); }
  .icon-btn { width: 56px; height: 56px; border-radius: 16px; background: var(--bg); box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; color: var(--ink); cursor: pointer; }
  .icon-btn.active { color: var(--accent); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
  .gauge { width: 140px; height: 140px; border-radius: 50%; background: var(--bg); box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light); display: flex; align-items: center; justify-content: center; }
  .gauge-inner { width: 100px; height: 100px; border-radius: 50%; background: var(--bg); box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-val { font-size: 28px; font-weight: 700; color: var(--accent); }
  .gauge-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>Neumorphism</h1>
    <div class="sub">Soft UI. Extruded surfaces from the same material as the background. One color. Two shadows.</div>
    <p>Every element rises out of or presses into the same clay. Inner shadow for inset, outer shadow for outset.</p>
  </div>

  <div class="card">
    <h2>Controls</h2>
    <div class="row">
      <div class="icon-btn active">♥</div>
      <div class="icon-btn">★</div>
      <div class="icon-btn">⏵</div>
      <div class="icon-btn">⚙</div>
      <div class="toggle on"></div>
      <div class="toggle"></div>
    </div>

    <h2>Input</h2>
    <div class="row"><input class="input" value="soft@neumorph.design"></div>

    <h2>Buttons</h2>
    <div class="row">
      <button class="btn btn-primary">Continue</button>
      <button class="btn">Cancel</button>
    </div>

    <h2>Gauge</h2>
    <div class="row">
      <div class="gauge"><div class="gauge-inner"><div class="gauge-val">72%</div><div class="gauge-lbl">Power</div></div></div>
    </div>

    <h2>Palette</h2>
    <div class="row">
      <span class="swatch" style="color:var(--accent);"></span>
      <span class="swatch"></span>
      <span class="swatch"></span>
      <span class="swatch"></span>
    </div>
  </div>
</div>
</body>
</html>
