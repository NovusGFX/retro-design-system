<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>11 8-Bit Arcade</title>
<style>
  :root {
    --bg: #0b0b1e;
    --pink: #ff2d95;
    --cyan: #00e5ff;
    --yellow: #ffd300;
    --green: #2bff88;
    --red: #ff3b3b;
    --purple: #7c1dfd;
    --white: #ffffff;
    --ink: #e9e9ff;
    --font: "Press Start 2P", "VT323", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(ellipse at top, #1a1440 0%, var(--bg) 60%),
      var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 14px;
    padding: 40px;
    min-height: 100vh;
    image-rendering: pixelated;
    background-attachment: fixed;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0 2px, rgba(255,255,255,0.02) 2px 3px);
    pointer-events: none;
  }
  h1 {
    font-family: var(--font);
    font-size: 42px;
    color: var(--yellow);
    text-shadow: 4px 4px 0 var(--red), 8px 8px 0 var(--purple);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    line-height: 1.1;
  }
  h2 {
    font-family: var(--font);
    font-size: 18px;
    color: var(--cyan);
    text-shadow: 2px 2px 0 var(--pink);
    margin: 24px 0 12px;
    text-transform: uppercase;
  }
  p { line-height: 1.8; margin-bottom: 10px; font-size: 12px; }
  .pixel-box {
    background: var(--bg);
    border: 4px solid var(--white);
    box-shadow:
      0 0 0 4px var(--bg),
      0 0 0 8px var(--pink),
      8px 8px 0 8px var(--purple);
    padding: 20px;
    margin-bottom: 28px;
    max-width: 720px;
  }
  .btn {
    font-family: var(--font);
    font-size: 12px;
    background: var(--yellow);
    color: var(--bg);
    border: 4px solid var(--white);
    box-shadow: 4px 4px 0 var(--red), 8px 8px 0 var(--purple);
    padding: 10px 18px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--red), 10px 10px 0 var(--purple); }
  .btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--red), 4px 4px 0 var(--purple); }
  .btn-b { background: var(--cyan); }
  .btn-c { background: var(--green); }
  .input {
    font-family: var(--font);
    font-size: 12px;
    background: var(--bg);
    color: var(--green);
    border: 4px solid var(--green);
    padding: 8px 10px;
    width: 280px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .input:focus { outline: none; border-color: var(--yellow); color: var(--yellow); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
  .swatch { width: 56px; height: 56px; border: 4px solid var(--white); box-shadow: 4px 4px 0 var(--bg); display: inline-block; }
  .hud {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
    font-size: 12px;
  }
  .hud div { color: var(--white); }
  .hud .value { color: var(--yellow); }
  .score {
    font-family: var(--font);
    font-size: 28px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--red);
  }
  .life {
    display: inline-block;
    width: 18px; height: 18px;
    background: var(--red);
    clip-path: polygon(50% 0, 100% 38%, 82% 100%, 50% 75%, 18% 100%, 0 38%);
    margin-right: 4px;
  }
  .coin-anim {
    display: inline-block;
    width: 24px; height: 24px;
    background: var(--yellow);
    border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: inset 2px 2px 0 #fff6a0;
    animation: spin 1.5s linear infinite;
  }
  @keyframes spin { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(0.2); } }
  .progress {
    background: var(--bg);
    border: 4px solid var(--white);
    height: 24px;
    position: relative;
    width: 400px;
  }
  .progress::after {
    content: "";
    position: absolute; inset: 0;
    width: 65%;
    background: repeating-linear-gradient(to right, var(--pink) 0 8px, var(--red) 8px 16px);
  }
  .sprite {
    width: 64px; height: 64px;
    image-rendering: pixelated;
    background:
      conic-gradient(from 45deg at 50% 50%, var(--pink), var(--cyan), var(--yellow), var(--green), var(--pink));
    border: 4px solid var(--white);
  }
</style>
</head>
<body>
<div class="hud">
  <div>1UP<div class="value score">000420</div></div>
  <div>HI<div class="value score">099999</div></div>
  <div>LIVES<div class="value"><span class="life"></span><span class="life"></span><span class="life"></span></div></div>
</div>

<h1>INSERT COIN</h1>

<div class="pixel-box">
  <p>8-bit arcade energy. Chunky pixels. Hot neon against deep space. Text shadows stacked 4px deep. Every surface screams "PRESS START."</p>

  <h2>Palette</h2>
  <div class="row">
    <span class="swatch" style="background:var(--pink)"></span>
    <span class="swatch" style="background:var(--cyan)"></span>
    <span class="swatch" style="background:var(--yellow)"></span>
    <span class="swatch" style="background:var(--green)"></span>
    <span class="swatch" style="background:var(--red)"></span>
    <span class="swatch" style="background:var(--purple)"></span>
  </div>

  <h2>Input</h2>
  <div class="row"><input class="input" value="ENTER YOUR NAME" maxlength="20"></div>

  <h2>Buttons</h2>
  <div class="row">
    <button class="btn">START</button>
    <button class="btn btn-b">OPTIONS</button>
    <button class="btn btn-c">HI SCORE</button>
  </div>

  <h2>HUD</h2>
  <div class="row">
    <span class="coin-anim"></span><span class="score">×27</span>
    <div class="progress"></div>
  </div>

  <h2>Sprite</h2>
  <div class="row"><div class="sprite"></div></div>
</div>
</body>
</html>
